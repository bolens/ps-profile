name: Test - Pester

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        include:
          - os: ubuntu-latest
            powershell: pwsh
          - os: windows-latest
            powershell: pwsh
    steps:
      - uses: actions/checkout@v6
      - name: Install Pester
        shell: pwsh
        run: |
          if (-not (Get-PSRepository -Name PSGallery -ErrorAction SilentlyContinue)) {
            Register-PSRepository -Default
          }
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name Pester -MinimumVersion 5.0.0 -Force -Scope CurrentUser
      - name: Run Pester
        run: ${{ matrix.powershell }} -NoProfile -File scripts/utils/code-quality/run-pester.ps1 -Coverage -Parallel
      - name: Upload test results
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.powershell }}
          path: pester-results.xml
      - name: Upload coverage reports
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.os }}-${{ matrix.powershell }}
          path: coverage.xml
