name: Spellcheck (cspell)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  cspell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.5.3
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run cspell
        run: |
          echo "Running cspell..."
          pnpm exec cspell "**/*" --no-progress --no-summary
        # NOTE: this step will fail the job if cspell finds issues. Remove or
        # adjust the config if you prefer warnings instead.
