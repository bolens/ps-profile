name: Docs - Markdown lint + link-check

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.5.3
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run markdownlint
        run: >
          pnpm exec markdownlint
          README.md WARP.md AGENTS.md ARCHITECTURE.md CONTRIBUTING.md
          PROFILE_README.md PROFILE_DEBUG.md profile.d/README.md
          requirements/README.md scripts/utils/README.md scripts/examples/README.md
          docs/README.md
      - name: Check links in README
        run: pnpm dlx markdown-link-check README.md
